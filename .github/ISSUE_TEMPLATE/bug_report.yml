name: Bug Report
description: 报告一个问题
labels: [bug]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: 问题描述
      description: 发生了什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 环境信息
      placeholder: macOS / Node / 浏览器 / commit hash
